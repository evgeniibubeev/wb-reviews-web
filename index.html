<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#8b5cf6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WB Отзывы">
  <link rel="manifest" href="/manifest.json">
  <title>WB Отзывы</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #10b981;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --yellow:  #f59e0b;
      --purple:  #8b5cf6;
      --radius:  12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .logo-badge { background: #cb11ab; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 5px; }
    .tabs { display: flex; gap: 3px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .tab-btn:hover { color: var(--text); background: var(--border); }
    .tab-btn.active { background: var(--purple); color: #fff; }
    .tab-btn .count { font-size: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; padding: 1px 5px; margin-left: 3px; }
    .header-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: auto; }

    /* ── Buttons ── */
    button { border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; border-radius: 8px; padding: 8px 13px; transition: opacity 0.15s, transform 0.1s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap; }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost  { background: var(--border); color: var(--text); }
    .btn-green  { background: var(--green);  color: #fff; }
    .btn-blue   { background: var(--blue);   color: #fff; }
    .btn-muted  { background: #2a2d3a; color: var(--muted); }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-yellow { background: var(--yellow); color: #000; }

    /* ── Main ── */
    main { max-width: 820px; margin: 0 auto; padding: 16px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .star-filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .star-filter { background: var(--border); color: var(--muted); font-size: 12px; padding: 5px 10px; border-radius: 20px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; user-select: none; }
    .star-filter:hover { color: var(--text); }
    .star-filter.active { background: var(--yellow); color: #000; font-weight: 600; }
    .star-filter[data-f="0"].active { background: var(--purple); color: #fff; }
    .auto-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
    .auto-toggle input { cursor: pointer; accent-color: var(--purple); width: 14px; height: 14px; }

    /* ── State ── */
    .state-box { text-align: center; padding: 50px 20px; color: var(--muted); }
    .state-box .icon { font-size: 36px; margin-bottom: 10px; }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Card ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .card.done { opacity: 0.35; pointer-events: none; }
    .card.auto-sent { border-color: var(--green); opacity: 0.6; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .card-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .product-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-date { font-size: 12px; color: var(--muted); }
    .stars { display: flex; gap: 2px; font-size: 16px; flex-shrink: 0; }
    .star-filled { color: var(--yellow); }
    .star-empty  { color: var(--border); }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 5px; }
    .review-text { background: #12141c; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; word-break: break-word; }
    .reply-block { margin-bottom: 10px; }
    .reply-text { background: #12141c; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; min-height: 44px; word-break: break-word; }
    .reply-text.generating { color: var(--muted); font-style: italic; display: flex; align-items: center; gap: 8px; }
    .reply-text.generating::before { content: ''; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .reply-textarea { width: 100%; background: #12141c; border: 1px solid var(--blue); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.6; resize: vertical; min-height: 80px; outline: none; }
    .reply-textarea:focus { border-color: var(--purple); }
    .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .card-actions button { flex: 1; min-width: 100px; }
    .done-label { color: var(--green); font-size: 13px; }
    .auto-badge { background: var(--green); color: #fff; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .tpl-picker { margin-bottom: 7px; }
    .tpl-picker select { background: #12141c; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-size: 13px; font-family: inherit; width: 100%; cursor: pointer; outline: none; }

    /* ── Load more ── */
    .load-more { text-align: center; padding: 16px 0; }

    /* ── History ── */
    .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .history-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .history-product { font-weight: 600; font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-date { font-size: 12px; color: var(--muted); }
    .history-review { color: var(--muted); font-size: 13px; margin-bottom: 6px; font-style: italic; }
    .history-reply { font-size: 13px; color: var(--text); }
    .history-toolbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }

    /* ── Templates Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 50; display: none; }
    .modal-overlay.open { display: block; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; width: min(540px, 95vw); max-height: 85vh; overflow-y: auto; z-index: 51; display: none; }
    .modal.open { display: block; }
    .modal-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .modal-title h2 { font-size: 16px; }
    .tpl-item { background: #12141c; border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .tpl-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; gap: 8px; }
    .tpl-name { font-weight: 600; font-size: 13px; }
    .tpl-stars-badge { font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
    .tpl-text { color: var(--muted); font-size: 13px; }
    .tpl-form { background: #12141c; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 12px; }
    .tpl-form h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .form-row { margin-bottom: 9px; }
    .form-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 3px; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px; font-family: inherit; font-size: 13px; outline: none; }
    .form-row textarea { resize: vertical; min-height: 65px; }
    .form-row input:focus, .form-row textarea:focus { border-color: var(--purple); }

    /* ── Analysis ── */
    .analysis-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
    .analysis-form h2 { font-size: 15px; margin-bottom: 5px; }
    .analysis-form p { color: var(--muted); font-size: 13px; margin-bottom: 13px; }
    .analysis-input-row { display: flex; gap: 8px; }
    .analysis-input-row input { flex: 1; background: #12141c; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; font-family: inherit; font-size: 14px; outline: none; min-width: 0; }
    .analysis-input-row input:focus { border-color: var(--purple); }
    .analysis-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; display: none; }
    .analysis-result.show { display: block; }
    .analysis-meta { font-size: 13px; color: var(--muted); margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .analysis-body h2 { font-size: 14px; font-weight: 600; color: var(--purple); margin: 14px 0 7px; }
    .analysis-body h2:first-child { margin-top: 0; }
    .analysis-body ul { padding-left: 16px; }
    .analysis-body li { margin-bottom: 4px; }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 100; max-width: calc(100vw - 32px); }
    .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideIn 0.2s ease; }
    .toast.success { border-color: var(--green); }
    .toast.error   { border-color: var(--red); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 8px 12px; gap: 8px; }
      .logo-text { display: none; }
      .header-actions .btn-ghost:not(#btn-refresh) { padding: 7px 10px; font-size: 12px; }
      main { padding: 12px; }
      .card { padding: 13px; }
      .card-actions button { min-width: 80px; font-size: 12px; padding: 7px 10px; }
      .analysis-input-row { flex-direction: column; }
      .modal { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">WB</span>
    <span class="logo-text">Управление отзывами</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('reviews')">Отзывы <span class="count" id="cnt-reviews">—</span></button>
    <button class="tab-btn" onclick="switchTab('questions')">Вопросы <span class="count" id="cnt-questions">—</span></button>
    <button class="tab-btn" onclick="switchTab('history')">История <span class="count" id="cnt-history">—</span></button>
    <button class="tab-btn" onclick="switchTab('analysis')">Анализ</button>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" id="btn-style" onclick="loadStyles()">🎨</button>
    <button class="btn-ghost" onclick="openTemplates()">📋</button>
    <button class="btn-ghost" id="btn-refresh" onclick="loadAll()">↻ Обновить</button>
  </div>
</header>

<main>
  <!-- Reviews -->
  <div id="tab-reviews" class="tab-content active">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="star-filters">
          <span class="star-filter active" data-f="0" onclick="setFilter(0)">Все</span>
          <span class="star-filter" data-f="1" onclick="setFilter(1)">★</span>
          <span class="star-filter" data-f="2" onclick="setFilter(2)">★★</span>
          <span class="star-filter" data-f="3" onclick="setFilter(3)">★★★</span>
          <span class="star-filter" data-f="4" onclick="setFilter(4)">★★★★</span>
          <span class="star-filter" data-f="5" onclick="setFilter(5)">★★★★★</span>
        </div>
        <label class="auto-toggle">
          <input type="checkbox" id="auto-reply-toggle" checked>
          Автоответ без текста
        </label>
      </div>
      <button class="btn-green" id="btn-approve-all" onclick="approveAll()" style="display:none">✓ Отправить все</button>
    </div>
    <div id="reviews-list"><div class="state-box"><div class="spinner"></div><p>Загрузка отзывов…</p></div></div>
    <div class="load-more" id="load-more" style="display:none">
      <button class="btn-ghost" id="btn-load-more" onclick="loadMoreReviews()">Загрузить ещё</button>
    </div>
  </div>

  <!-- Questions -->
  <div id="tab-questions" class="tab-content">
    <div id="questions-list"><div class="state-box"><div class="spinner"></div><p>Загрузка вопросов…</p></div></div>
  </div>

  <!-- History -->
  <div id="tab-history" class="tab-content">
    <div class="history-toolbar">
      <button class="btn-muted" onclick="clearHistory()">Очистить историю</button>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- Analysis -->
  <div id="tab-analysis" class="tab-content">
    <div class="analysis-form">
      <h2>Анализ отзывов</h2>
      <p>Введите артикул WB для анализа конкретного товара, или оставьте пустым для анализа последних 100 отзывов магазина.</p>
      <div class="analysis-input-row">
        <input type="text" id="analysis-nm" placeholder="Артикул (nmId), например: 12345678" inputmode="numeric">
        <button class="btn-purple" id="btn-analyze" onclick="runAnalysis()">Анализировать</button>
      </div>
    </div>
    <div class="analysis-result" id="analysis-result">
      <div class="analysis-meta" id="analysis-meta"></div>
      <div class="analysis-body" id="analysis-body"></div>
    </div>
  </div>
</main>

<!-- Templates Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeTemplates()"></div>
<div class="modal" id="modal-templates">
  <div class="modal-title">
    <h2>📋 Шаблоны ответов</h2>
    <button class="btn-ghost" onclick="closeTemplates()" style="padding:5px 9px">✕</button>
  </div>
  <div id="tpl-list"></div>
  <div class="tpl-form">
    <h3>Добавить шаблон</h3>
    <div class="form-row"><label>Название</label><input id="tpl-name" placeholder="Например: Спасибо за 5 звёзд"></div>
    <div class="form-row"><label>Для оценки</label>
      <select id="tpl-stars">
        <option value="0">Все отзывы</option>
        <option value="5">5 ⭐</option>
        <option value="4">4 ⭐</option>
        <option value="3">3 ⭐</option>
        <option value="2">2 ⭐</option>
        <option value="1">1 ⭐</option>
      </select>
    </div>
    <div class="form-row"><label>Текст ответа</label><textarea id="tpl-text" placeholder="Текст шаблона…"></textarea></div>
    <button class="btn-purple" onclick="addTemplate()">Добавить</button>
  </div>
</div>

<div id="toast-container"></div>

<script>
  const API = {
    reviews:       '/.netlify/functions/reviews',
    reply:         '/.netlify/functions/reply',
    generate:      '/.netlify/functions/generate',
    styles:        '/.netlify/functions/styles',
    questions:     '/.netlify/functions/questions',
    replyQuestion: '/.netlify/functions/reply-question',
    analyze:       '/.netlify/functions/analyze',
  }

  // ── State ──────────────────────────────────────────────────────────────────
  const rCards = new Map()
  const qCards = new Map()
  let styleExamples = []
  let starFilter = 0
  let reviewsOffset = 0

  // ── Cache ──────────────────────────────────────────────────────────────────
  const CACHE_TTL = 65_000

  function getCache(key, ignoreTTL = false) {
    try {
      const { ts, data } = JSON.parse(localStorage.getItem(key) || 'null') || {}
      if (!data) return null
      if (ignoreTTL || Date.now() - ts < CACHE_TTL) return { data, ts, fresh: Date.now() - ts < CACHE_TTL }
    } catch {}
    return null
  }

  function setCache(key, data) {
    try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })) } catch {}
  }

  function fmtAgo(ts) {
    const min = Math.round((Date.now() - ts) / 60000)
    if (min < 1) return 'только что'
    if (min < 60) return `${min} мин назад`
    return `${Math.round(min/60)} ч назад`
  }

  let countdownTimer = null
  function startCountdown(btn, label) {
    clearInterval(countdownTimer)
    let sec = Math.ceil(CACHE_TTL / 1000)
    btn.disabled = true
    countdownTimer = setInterval(() => {
      sec--
      if (sec <= 0) { clearInterval(countdownTimer); btn.disabled = false; btn.textContent = label }
      else btn.textContent = `${label} (${sec}с)`
    }, 1000)
  }

  // ── History ────────────────────────────────────────────────────────────────
  const HIST_KEY = 'wb_reply_history'

  function getHistory() { try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]') } catch { return [] } }

  function addToHistory(item) {
    const h = getHistory()
    h.unshift({ ...item, ts: Date.now() })
    if (h.length > 500) h.splice(500)
    localStorage.setItem(HIST_KEY, JSON.stringify(h))
    updateHistoryCount()
  }

  function clearHistory() {
    if (!confirm('Очистить всю историю ответов?')) return
    localStorage.removeItem(HIST_KEY)
    renderHistory()
    updateHistoryCount()
  }

  function updateHistoryCount() {
    document.getElementById('cnt-history').textContent = getHistory().length
  }

  function renderHistory() {
    const h = getHistory()
    const el = document.getElementById('history-list')
    if (h.length === 0) {
      el.innerHTML = `<div class="state-box"><div class="icon">📭</div><p>История пуста</p></div>`
      return
    }
    el.innerHTML = h.map(item => `
      <div class="history-item">
        <div class="history-header">
          <span class="history-product">${escHtml(item.product || '—')}</span>
          ${item.stars ? `<div class="stars" style="font-size:13px">${starsHtml(item.stars)}</div>` : '<span style="font-size:16px">❓</span>'}
          ${item.auto ? '<span class="auto-badge">Авто</span>' : ''}
          <span class="history-date">${fmtDatetime(item.ts)}</span>
        </div>
        ${item.reviewText ? `<div class="history-review">"${escHtml(item.reviewText.slice(0, 120))}${item.reviewText.length > 120 ? '…' : ''}"</div>` : ''}
        <div class="history-reply">${escHtml(item.replyText)}</div>
      </div>
    `).join('')
  }

  // ── Templates ─────────────────────────────────────────────────────────────
  const DEFAULT_TEMPLATES = [
    { id: 't1', name: 'Спасибо за 5⭐', stars: 5, text: 'Благодарим Вас за отличный отзыв! Очень рады, что товар понравился. Будем рады видеть Вас снова!' },
    { id: 't2', name: 'Сожаление 1–2⭐', stars: 0, text: 'Приносим свои извинения за доставленные неудобства. Пожалуйста, напишите нам в чат поддержки — обязательно разберёмся.' },
    { id: 't3', name: 'Учтём 3⭐', stars: 3, text: 'Спасибо за обратную связь! Учтём Ваши пожелания. Надеемся на повторную покупку!' },
  ]

  function getTemplates() { try { return JSON.parse(localStorage.getItem('wb_templates') || 'null') || [...DEFAULT_TEMPLATES] } catch { return [...DEFAULT_TEMPLATES] } }
  function saveTemplates(arr) { localStorage.setItem('wb_templates', JSON.stringify(arr)) }

  function getBestTemplate(stars) {
    const arr = getTemplates()
    return arr.find(t => t.stars === stars) || arr.find(t => t.stars === 0) || null
  }

  function addTemplate() {
    const name = document.getElementById('tpl-name').value.trim()
    const stars = parseInt(document.getElementById('tpl-stars').value)
    const text  = document.getElementById('tpl-text').value.trim()
    if (!name || !text) return toast('Заполни название и текст', 'error')
    const arr = getTemplates()
    arr.push({ id: 't' + Date.now(), name, stars, text })
    saveTemplates(arr)
    document.getElementById('tpl-name').value = ''
    document.getElementById('tpl-text').value = ''
    renderTemplatesList()
    toast('Шаблон добавлен')
  }

  function deleteTemplate(id) { saveTemplates(getTemplates().filter(t => t.id !== id)); renderTemplatesList() }

  function renderTemplatesList() {
    const arr = getTemplates()
    document.getElementById('tpl-list').innerHTML = arr.length === 0
      ? '<p style="color:var(--muted);margin-bottom:12px">Нет шаблонов</p>'
      : arr.map(t => `
        <div class="tpl-item">
          <div class="tpl-item-header">
            <span class="tpl-name">${escHtml(t.name)}</span>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="tpl-stars-badge">${t.stars ? t.stars + '⭐' : 'Все'}</span>
              <button class="btn-muted" style="padding:3px 8px;font-size:11px" onclick="deleteTemplate('${t.id}')">✕</button>
            </div>
          </div>
          <div class="tpl-text">${escHtml(t.text)}</div>
        </div>`).join('')
  }

  function openTemplates()  { document.getElementById('modal-overlay').classList.add('open'); document.getElementById('modal-templates').classList.add('open'); renderTemplatesList() }
  function closeTemplates() { document.getElementById('modal-overlay').classList.remove('open'); document.getElementById('modal-templates').classList.remove('open') }

  // ── Utils ──────────────────────────────────────────────────────────────────
  const sleep = ms => new Promise(r => setTimeout(r, ms))
  const escHtml = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  const starsHtml = n => Array.from({length:5},(_,i) => `<span class="${i<n?'star-filled':'star-empty'}">★</span>`).join('')
  const fmtDate = iso => new Date(iso).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'})
  const fmtDatetime = ts => new Date(ts).toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})

  function toast(msg, type = 'success') {
    const el = document.createElement('div')
    el.className = `toast ${type}`
    el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg
    document.getElementById('toast-container').appendChild(el)
    setTimeout(() => el.remove(), 3500)
  }

  // ── Tab switching ──────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'))
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'))
    document.getElementById(`tab-${tab}`).classList.add('active')
    const idx = ['reviews','questions','history','analysis'].indexOf(tab)
    document.querySelectorAll('.tab-btn')[idx]?.classList.add('active')
    currentTab = tab
    if (tab === 'history') renderHistory()
    if (tab === 'questions' && qCards.size === 0) loadQuestions()
  }

  // ── Star filter ────────────────────────────────────────────────────────────
  function setFilter(n) {
    starFilter = n
    document.querySelectorAll('.star-filter').forEach(el => el.classList.toggle('active', parseInt(el.dataset.f) === n))
    for (const [id, c] of rCards) {
      const el = document.getElementById(`card-${id}`)
      if (el) el.style.display = (n === 0 || (c.review.productValuation || 0) === n) ? '' : 'none'
    }
  }

  function updateFilterCounts() {
    const counts = {}
    for (const [,c] of rCards) { const s = c.review.productValuation || 0; counts[s] = (counts[s]||0)+1 }
    document.querySelector('[data-f="0"]').textContent = `Все (${rCards.size})`
    for (let i = 1; i <= 5; i++) {
      const btn = document.querySelector(`[data-f="${i}"]`)
      const cnt = counts[i] || 0
      btn.textContent = '★'.repeat(i) + (cnt ? ` (${cnt})` : '')
      btn.style.display = cnt ? '' : 'none'
    }
    document.getElementById('cnt-reviews').textContent = rCards.size
  }

  function updateApproveAllBtn() {
    const ready = [...rCards.values()].filter(c => c.state === 'ready').length
    const btn = document.getElementById('btn-approve-all')
    btn.style.display = ready > 0 ? '' : 'none'
    btn.textContent = `✓ Отправить все (${ready})`
  }

  // ── Render review card ─────────────────────────────────────────────────────
  function renderReviewCard(id) {
    const c = rCards.get(id), el = document.getElementById(`card-${id}`)
    if (!el) return
    const product = c.review.productDetails?.productName || 'Неизвестный товар'
    const text = c.review.text || '(без текста)'
    const n = c.review.productValuation || 0

    let replyHtml = ''
    if (c.state === 'generating') replyHtml = `<div class="reply-text generating">Генерирую ответ…</div>`
    else if (c.state === 'editing') {
      const tpls = getTemplates().filter(t => t.stars === 0 || t.stars === n)
      const picker = tpls.length ? `<div class="tpl-picker"><select onchange="applyTpl(this,'${id}')"><option value="">— шаблон —</option>${tpls.map(t=>`<option value="${escHtml(t.text)}">${escHtml(t.name)}</option>`).join('')}</select></div>` : ''
      replyHtml = picker + `<textarea class="reply-textarea" id="ta-${id}">${escHtml(c.replyText)}</textarea>`
    } else replyHtml = `<div class="reply-text">${escHtml(c.replyText)}</div>`

    let actionsHtml = ''
    if (c.state === 'done') actionsHtml = `<span class="done-label">✓ Отправлен${c.auto ? ' <span class="auto-badge">Авто</span>' : ''}</span>`
    else if (c.state === 'generating') actionsHtml = `<button class="btn-green" disabled>✓ Отправить</button><button class="btn-blue" disabled>✏ Ред.</button><button class="btn-muted" disabled>✕</button>`
    else if (c.state === 'editing') actionsHtml = `<button class="btn-green" onclick="saveEdit('${id}','review')">✓ Отправить</button><button class="btn-ghost" onclick="cancelEdit('${id}','review')">Отмена</button><button class="btn-muted" onclick="skip('${id}','review')">✕</button>`
    else actionsHtml = `<button class="btn-green" onclick="approve('${id}','review')">✓ Отправить</button><button class="btn-blue" onclick="startEdit('${id}','review')">✏ Ред.</button><button class="btn-muted" onclick="skip('${id}','review')">✕</button>`

    el.className = `card${c.state === 'done' ? (c.auto ? ' auto-sent' : ' done') : ''}`
    el.style.display = (starFilter === 0 || n === starFilter) ? '' : 'none'
    el.innerHTML = `
      <div class="card-header">
        <div class="card-meta"><div class="product-name">${escHtml(product)}</div><div class="card-date">${fmtDate(c.review.createdDate)}</div></div>
        <div class="stars">${starsHtml(n)}</div>
      </div>
      <div class="section-label">Отзыв</div>
      <div class="review-text">${escHtml(text)}</div>
      <div class="reply-block"><div class="section-label">Предложенный ответ</div>${replyHtml}</div>
      <div class="card-actions">${actionsHtml}</div>`
    updateApproveAllBtn()
  }

  // ── Render question card ───────────────────────────────────────────────────
  function renderQuestionCard(id) {
    const c = qCards.get(id), el = document.getElementById(`qcard-${id}`)
    if (!el) return
    const product = c.q.productDetails?.productName || 'Неизвестный товар'
    const text = c.q.text || '(без текста)'

    let replyHtml = ''
    if (c.state === 'generating') replyHtml = `<div class="reply-text generating">Генерирую ответ…</div>`
    else if (c.state === 'editing') replyHtml = `<textarea class="reply-textarea" id="qta-${id}">${escHtml(c.replyText)}</textarea>`
    else replyHtml = `<div class="reply-text">${escHtml(c.replyText)}</div>`

    let actionsHtml = ''
    if (c.state === 'done') actionsHtml = `<span class="done-label">✓ Ответ отправлен</span>`
    else if (c.state === 'generating') actionsHtml = `<button class="btn-green" disabled>✓ Отправить</button><button class="btn-blue" disabled>✏ Ред.</button><button class="btn-muted" disabled>✕</button>`
    else if (c.state === 'editing') actionsHtml = `<button class="btn-green" onclick="saveEdit('${id}','question')">✓ Отправить</button><button class="btn-ghost" onclick="cancelEdit('${id}','question')">Отмена</button><button class="btn-muted" onclick="skip('${id}','question')">✕</button>`
    else actionsHtml = `<button class="btn-green" onclick="approve('${id}','question')">✓ Отправить</button><button class="btn-blue" onclick="startEdit('${id}','question')">✏ Ред.</button><button class="btn-muted" onclick="skip('${id}','question')">✕</button>`

    el.className = `card${c.state === 'done' ? ' done' : ''}`
    el.innerHTML = `
      <div class="card-header">
        <div class="card-meta"><div class="product-name">${escHtml(product)}</div><div class="card-date">${fmtDate(c.q.createdDate)}</div></div>
        <span style="font-size:20px">❓</span>
      </div>
      <div class="section-label">Вопрос</div>
      <div class="review-text">${escHtml(text)}</div>
      <div class="reply-block"><div class="section-label">Предложенный ответ</div>${replyHtml}</div>
      <div class="card-actions">${actionsHtml}</div>`
  }

  function applyTpl(sel, id) { const ta = document.getElementById(`ta-${id}`); if (ta && sel.value) { ta.value = sel.value; sel.value = '' } }

  // ── Actions ────────────────────────────────────────────────────────────────
  async function approve(id, type, auto = false, retry = false) {
    const isR = type === 'review'
    const c = isR ? rCards.get(id) : qCards.get(id)
    const endpoint = isR ? API.reply : API.replyQuestion
    const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, text: c.replyText }) })

    if (res.ok) {
      c.state = 'done'; c.auto = auto
      addToHistory({
        type, auto,
        product: isR ? (c.review.productDetails?.productName || '') : (c.q.productDetails?.productName || ''),
        stars: isR ? (c.review.productValuation || 0) : 0,
        reviewText: isR ? (c.review.text || '') : (c.q.text || ''),
        replyText: c.replyText
      })
      isR ? renderReviewCard(id) : renderQuestionCard(id)
      if (!auto) toast('Ответ отправлен на Wildberries')

    } else if (res.status === 429 && !retry) {
      // Rate limit — ждём 65 сек и повторяем автоматически
      let sec = 65
      const interval = setInterval(() => {
        sec--
        const el = document.getElementById(`card-${id}`) || document.getElementById(`qcard-${id}`)
        const btn = el?.querySelector('.btn-green')
        if (btn) btn.textContent = `↻ Повтор через ${sec}с`
        if (sec <= 0) {
          clearInterval(interval)
          if (btn) btn.textContent = '✓ Отправить'
          approve(id, type, auto, true)
        }
      }, 1000)
      toast('Rate limit WB — повтор через 65 сек', 'error')

    } else {
      const err = await res.json().catch(() => ({}))
      toast(err.error || 'Ошибка отправки', 'error')
    }
  }

  function startEdit(id, type) {
    const c = type === 'review' ? rCards.get(id) : qCards.get(id)
    c.state = 'editing'
    type === 'review' ? renderReviewCard(id) : renderQuestionCard(id)
    setTimeout(() => { const ta = document.getElementById(type==='review'?`ta-${id}`:`qta-${id}`); if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length) } }, 50)
  }

  function cancelEdit(id, type) { const c = type==='review'?rCards.get(id):qCards.get(id); c.state='ready'; type==='review'?renderReviewCard(id):renderQuestionCard(id) }

  async function saveEdit(id, type) {
    const ta = document.getElementById(type==='review'?`ta-${id}`:`qta-${id}`)
    if (!ta) return
    const text = ta.value.trim()
    if (!text) return toast('Ответ не может быть пустым', 'error')
    const c = type==='review'?rCards.get(id):qCards.get(id)
    c.replyText = text
    await approve(id, type)
  }

  function skip(id, type) { const c = type==='review'?rCards.get(id):qCards.get(id); c.state='done'; type==='review'?renderReviewCard(id):renderQuestionCard(id) }

  async function approveAll() {
    const ready = [...rCards.entries()].filter(([,c]) => c.state === 'ready')
    if (!ready.length) return
    const btn = document.getElementById('btn-approve-all')
    btn.disabled = true
    for (const [id] of ready) { await approve(id, 'review'); await sleep(400) }
    btn.disabled = false; updateApproveAllBtn()
  }

  // ── Auto-reply ─────────────────────────────────────────────────────────────
  async function tryAutoReply(review) {
    if (!document.getElementById('auto-reply-toggle').checked) return false
    if (review.text && review.text.trim()) return false
    const tpl = getBestTemplate(review.productValuation || 0)
    if (!tpl) return false
    const id = review.id
    rCards.set(id, { review, replyText: tpl.text, state: 'generating', auto: true })
    await approve(id, 'review', true)
    return true
  }

  // ── Generate ───────────────────────────────────────────────────────────────
  async function generateReview(id) {
    const c = rCards.get(id)
    try {
      const res = await fetch(API.generate, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'review', review: c.review, examples: styleExamples }) })
      if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || 'Ошибка')
      c.replyText = (await res.json()).reply; c.state = 'ready'
    } catch { c.replyText = '— не удалось сгенерировать ответ'; c.state = 'ready' }
    renderReviewCard(id)
  }

  async function generateQuestion(id) {
    const c = qCards.get(id)
    try {
      const res = await fetch(API.generate, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'question', question: c.q }) })
      if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || 'Ошибка')
      c.replyText = (await res.json()).reply; c.state = 'ready'
    } catch { c.replyText = '— не удалось сгенерировать ответ'; c.state = 'ready' }
    renderQuestionCard(id)
  }

  // ── Load reviews ───────────────────────────────────────────────────────────
  async function loadReviews(append = false) {
    const list = document.getElementById('reviews-list')
    if (!append) { rCards.clear(); reviewsOffset = 0; list.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Загрузка отзывов…</p></div>` }

    try {
      let reviews = null
      let cacheInfo = null

      if (!append) {
        cacheInfo = getCache('wb_reviews', true)  // всегда читаем кэш
        if (cacheInfo?.fresh) {
          reviews = cacheInfo.data  // кэш свежий — используем
        } else {
          // Пробуем загрузить с WB
          const res = await fetch(`${API.reviews}?skip=${reviewsOffset}`)
          if (!res.ok) {
            // Ошибка — показываем старый кэш если есть
            if (cacheInfo?.data) {
              reviews = cacheInfo.data
              const ago = fmtAgo(cacheInfo.ts)
              list.innerHTML = `<div style="background:#1a1d27;border:1px solid #f59e0b;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#f59e0b">⚠️ Rate limit WB — показаны данные ${ago}. Новые загрузятся через минуту.</div>`
            } else {
              throw new Error((await res.json().catch(()=>({}))).error || `HTTP ${res.status}`)
            }
          } else {
            reviews = await res.json()
            setCache('wb_reviews', reviews)
          }
        }
      } else {
        const res = await fetch(`${API.reviews}?skip=${reviewsOffset}`)
        if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || `HTTP ${res.status}`)
        reviews = await res.json()
      }

      if (!append) list.innerHTML = ''
      document.getElementById('cnt-reviews').textContent = rCards.size + reviews.length

      let autoCount = 0
      const manual = []

      for (const r of reviews) {
        const wasAuto = await tryAutoReply(r)
        if (wasAuto) { autoCount++; continue }
        manual.push(r)
      }

      if (manual.length === 0 && rCards.size === 0) {
        list.innerHTML = `<div class="state-box"><div class="icon">🎉</div><p>Неотвеченных отзывов нет</p></div>`
      } else {
        for (const r of manual) {
          const div = document.createElement('div')
          div.className = 'card'; div.id = `card-${r.id}`
          list.appendChild(div)
          rCards.set(r.id, { review: r, replyText: '', state: 'generating' })
          renderReviewCard(r.id)
        }
      }

      reviewsOffset += reviews.length
      updateFilterCounts()

      const loadMoreEl = document.getElementById('load-more')
      loadMoreEl.style.display = reviews.length === 50 ? '' : 'none'

      if (autoCount > 0) toast(`Автоматически отправлено ${autoCount} ответов на отзывы без текста`)

      for (const r of manual) {
        await generateReview(r.id)
        await sleep(400)
      }

    } catch (e) {
      if (!append) list.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>${escHtml(e.message)}</p></div>`
      else toast(e.message, 'error')
    }
  }

  async function loadMoreReviews() {
    const btn = document.getElementById('btn-load-more')
    btn.disabled = true; btn.textContent = 'Загружаю…'
    await loadReviews(true)
    btn.disabled = false; btn.textContent = 'Загрузить ещё'
  }

  // ── Load questions ─────────────────────────────────────────────────────────
  async function loadQuestions() {
    const list = document.getElementById('questions-list')
    qCards.clear()
    list.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Загрузка вопросов…</p></div>`
    try {
      let questions = null
      const qCache = getCache('wb_questions', true)
      if (qCache?.fresh) {
        questions = qCache.data
      } else {
        const res = await fetch(API.questions)
        if (!res.ok) {
          if (qCache?.data) { questions = qCache.data }
          else throw new Error((await res.json().catch(()=>({}))).error||`HTTP ${res.status}`)
        } else {
          questions = await res.json()
          setCache('wb_questions', questions)
        }
      }
      document.getElementById('cnt-questions').textContent = questions.length
      if (questions.length === 0) { list.innerHTML=`<div class="state-box"><div class="icon">✅</div><p>Неотвеченных вопросов нет</p></div>`; return }
      list.innerHTML = questions.map(q=>`<div class="card" id="qcard-${q.id}"></div>`).join('')
      for (const q of questions) { qCards.set(q.id,{q,replyText:'',state:'generating'}); renderQuestionCard(q.id) }
      for (const q of questions) { await generateQuestion(q.id); await sleep(400) }
    } catch (e) { list.innerHTML=`<div class="state-box"><div class="icon">⚠️</div><p>${escHtml(e.message)}</p></div>` }
  }

  // ── Load styles ────────────────────────────────────────────────────────────
  async function loadStyles() {
    const btn = document.getElementById('btn-style')
    btn.disabled = true; btn.textContent = '⏳'
    try {
      const res = await fetch(API.styles)
      if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error||`HTTP ${res.status}`)
      const data = await res.json(); styleExamples = data.examples||[]
      btn.textContent = `✓(${styleExamples.length})`
      toast(`Загружено ${styleExamples.length} примеров стиля`)
    } catch (e) { btn.disabled=false; btn.textContent='🎨'; toast(e.message,'error') }
  }

  // ── Load all ───────────────────────────────────────────────────────────────
  async function loadAll() {
    const btn = document.getElementById('btn-refresh')
    // Помечаем кэш устаревшим (не удаляем — нужен как fallback)
    try { const r = JSON.parse(localStorage.getItem('wb_reviews')||'null'); if (r) { r.ts = 0; localStorage.setItem('wb_reviews', JSON.stringify(r)) } } catch {}
    try { const q = JSON.parse(localStorage.getItem('wb_questions')||'null'); if (q) { q.ts = 0; localStorage.setItem('wb_questions', JSON.stringify(q)) } } catch {}
    startCountdown(btn, '↻ Обновить')
    // Загружаем только текущую вкладку — один запрос к WB
    if (currentTab === 'questions') await loadQuestions()
    else await loadReviews()
  }

  // ── Analysis ───────────────────────────────────────────────────────────────
  async function runAnalysis() {
    const nmId = document.getElementById('analysis-nm').value.trim()
    const btn = document.getElementById('btn-analyze')
    btn.disabled = true; btn.textContent = '⏳ Анализирую…'
    document.getElementById('analysis-result').classList.remove('show')
    try {
      const res = await fetch(API.analyze, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nmId:nmId||null}) })
      if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error||`HTTP ${res.status}`)
      const data = await res.json()
      document.getElementById('analysis-meta').innerHTML = `<strong>${escHtml(data.product)}</strong> · ${data.count} отзывов · средняя оценка ${data.avgRating} ⭐`
      document.getElementById('analysis-body').innerHTML = renderMarkdown(data.analysis)
      document.getElementById('analysis-result').classList.add('show')
    } catch (e) { toast(e.message,'error') }
    finally { btn.disabled=false; btn.textContent='Анализировать' }
  }

  function renderMarkdown(text) {
    return text
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^- (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>[^<]+<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
      .replace(/\n\n/g,'<br>')
  }

  // ── PWA ────────────────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {})
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  updateHistoryCount()
  loadReviews()
</script>
</body>
</html>
