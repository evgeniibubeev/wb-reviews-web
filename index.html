<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WB Отзывы</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --green:   #10b981;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --yellow:  #f59e0b;
      --purple:  #8b5cf6;
      --radius:  12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; flex-shrink: 0; }
    .logo-badge { background: #cb11ab; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 5px; }
    .tabs { display: flex; gap: 4px; flex: 1; }
    .tab-btn { background: none; border: none; color: var(--muted); font-size: 14px; font-weight: 500; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
    .tab-btn:hover { color: var(--text); background: var(--border); }
    .tab-btn.active { background: var(--purple); color: #fff; }
    .tab-btn .count { font-size: 11px; background: rgba(255,255,255,0.2); border-radius: 10px; padding: 1px 6px; margin-left: 4px; }
    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Buttons ── */
    button { border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; border-radius: 8px; padding: 7px 13px; transition: opacity 0.15s, transform 0.1s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost  { background: var(--border); color: var(--text); }
    .btn-green  { background: var(--green);  color: #fff; }
    .btn-blue   { background: var(--blue);   color: #fff; }
    .btn-red    { background: var(--red);    color: #fff; }
    .btn-muted  { background: #2a2d3a; color: var(--muted); }
    .btn-purple { background: var(--purple); color: #fff; }

    /* ── Main ── */
    main { max-width: 820px; margin: 0 auto; padding: 20px 16px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .star-filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .star-filter { background: var(--border); color: var(--muted); font-size: 12px; padding: 5px 10px; border-radius: 20px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
    .star-filter:hover { color: var(--text); }
    .star-filter.active { background: var(--yellow); color: #000; border-color: var(--yellow); font-weight: 600; }
    .star-filter[data-f="0"].active { background: var(--purple); color: #fff; border-color: var(--purple); }

    /* ── State boxes ── */
    .state-box { text-align: center; padding: 60px 24px; color: var(--muted); }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; transition: opacity 0.2s; }
    .card.done { opacity: 0.35; pointer-events: none; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .card-meta { display: flex; flex-direction: column; gap: 3px; }
    .product-name { font-weight: 600; font-size: 15px; }
    .card-date { font-size: 12px; color: var(--muted); }
    .stars { display: flex; gap: 2px; font-size: 17px; flex-shrink: 0; }
    .star-filled { color: var(--yellow); }
    .star-empty  { color: var(--border); }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
    .review-text { background: #12141c; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; margin-bottom: 12px; }
    .reply-block { margin-bottom: 12px; }
    .reply-text { background: #12141c; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; min-height: 48px; }
    .reply-text.generating { color: var(--muted); font-style: italic; display: flex; align-items: center; gap: 10px; }
    .reply-text.generating::before { content: ''; width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .reply-textarea { width: 100%; background: #12141c; border: 1px solid var(--blue); border-radius: 8px; padding: 11px 13px; color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.6; resize: vertical; min-height: 90px; outline: none; }
    .reply-textarea:focus { border-color: var(--purple); }
    .card-actions { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .done-label { color: var(--green); font-size: 13px; }

    /* ── Templates picker inside card ── */
    .tpl-picker { margin-bottom: 8px; }
    .tpl-picker select { background: #12141c; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-size: 13px; font-family: inherit; width: 100%; cursor: pointer; outline: none; }

    /* ── Templates Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: none; }
    .modal-overlay.open { display: block; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: min(560px, 95vw); max-height: 80vh; overflow-y: auto; z-index: 51; display: none; }
    .modal.open { display: block; }
    .modal h2 { font-size: 17px; margin-bottom: 18px; }
    .tpl-item { background: #12141c; border: 1px solid var(--border); border-radius: 10px; padding: 13px; margin-bottom: 10px; }
    .tpl-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
    .tpl-name { font-weight: 600; }
    .tpl-stars-badge { font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 10px; }
    .tpl-text { color: var(--muted); font-size: 13px; margin-bottom: 8px; white-space: pre-wrap; }
    .tpl-form { background: #12141c; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 14px; }
    .tpl-form h3 { font-size: 14px; margin-bottom: 12px; color: var(--muted); }
    .form-row { margin-bottom: 10px; }
    .form-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px; font-family: inherit; font-size: 13px; outline: none; }
    .form-row textarea { resize: vertical; min-height: 70px; }
    .form-row input:focus, .form-row textarea:focus { border-color: var(--purple); }

    /* ── Analysis Tab ── */
    .analysis-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .analysis-form h2 { font-size: 16px; margin-bottom: 6px; }
    .analysis-form p { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .analysis-input-row { display: flex; gap: 10px; }
    .analysis-input-row input { flex: 1; background: #12141c; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 13px; font-family: inherit; font-size: 14px; outline: none; }
    .analysis-input-row input:focus { border-color: var(--purple); }
    .analysis-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: none; }
    .analysis-result.show { display: block; }
    .analysis-meta { font-size: 13px; color: var(--muted); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .analysis-body h2 { font-size: 15px; font-weight: 600; color: var(--purple); margin: 16px 0 8px; }
    .analysis-body h2:first-child { margin-top: 0; }
    .analysis-body ul { padding-left: 18px; }
    .analysis-body li { margin-bottom: 5px; color: var(--text); }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 7px; z-index: 100; }
    .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideIn 0.2s ease; }
    .toast.success { border-color: var(--green); }
    .toast.error   { border-color: var(--red); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-badge">WB</span> Управление отзывами</div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('reviews')">Отзывы <span class="count" id="cnt-reviews">—</span></button>
    <button class="tab-btn" onclick="switchTab('questions')">Вопросы <span class="count" id="cnt-questions">—</span></button>
    <button class="tab-btn" onclick="switchTab('analysis')">Анализ</button>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" id="btn-style" onclick="loadStyles()">🎨 Стиль</button>
    <button class="btn-ghost" onclick="openTemplates()">📋 Шаблоны</button>
    <button class="btn-ghost" id="btn-refresh" onclick="loadAll()">↻ Обновить</button>
  </div>
</header>

<main>
  <!-- Reviews Tab -->
  <div id="tab-reviews" class="tab-content active">
    <div class="toolbar">
      <div class="star-filters">
        <span class="star-filter active" data-f="0" onclick="setFilter(0)">Все</span>
        <span class="star-filter" data-f="1" onclick="setFilter(1)">★</span>
        <span class="star-filter" data-f="2" onclick="setFilter(2)">★★</span>
        <span class="star-filter" data-f="3" onclick="setFilter(3)">★★★</span>
        <span class="star-filter" data-f="4" onclick="setFilter(4)">★★★★</span>
        <span class="star-filter" data-f="5" onclick="setFilter(5)">★★★★★</span>
      </div>
      <button class="btn-green" id="btn-approve-all" onclick="approveAll()" style="display:none">✓ Отправить все одобренные</button>
    </div>
    <div id="reviews-list"><div class="state-box"><div class="spinner"></div><p>Загрузка отзывов…</p></div></div>
  </div>

  <!-- Questions Tab -->
  <div id="tab-questions" class="tab-content">
    <div id="questions-list"><div class="state-box"><div class="spinner"></div><p>Загрузка вопросов…</p></div></div>
  </div>

  <!-- Analysis Tab -->
  <div id="tab-analysis" class="tab-content">
    <div class="analysis-form">
      <h2>Анализ отзывов</h2>
      <p>Введите артикул WB для анализа конкретного товара, или оставьте поле пустым для анализа последних 100 отзывов магазина.</p>
      <div class="analysis-input-row">
        <input type="text" id="analysis-nm" placeholder="Артикул товара (nmId), например: 12345678" inputmode="numeric">
        <button class="btn-purple" id="btn-analyze" onclick="runAnalysis()">Анализировать</button>
      </div>
    </div>
    <div class="analysis-result" id="analysis-result">
      <div class="analysis-meta" id="analysis-meta"></div>
      <div class="analysis-body" id="analysis-body"></div>
    </div>
  </div>
</main>

<!-- Templates Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeTemplates()"></div>
<div class="modal" id="modal-templates">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2 style="margin:0">📋 Шаблоны ответов</h2>
    <button class="btn-ghost" onclick="closeTemplates()" style="padding:5px 10px">✕</button>
  </div>
  <div id="tpl-list"></div>
  <div class="tpl-form">
    <h3>Добавить шаблон</h3>
    <div class="form-row"><label>Название</label><input id="tpl-name" placeholder="Например: Спасибо за 5 звёзд"></div>
    <div class="form-row"><label>Для оценки</label>
      <select id="tpl-stars">
        <option value="0">Все отзывы</option>
        <option value="5">5 ⭐</option>
        <option value="4">4 ⭐</option>
        <option value="3">3 ⭐</option>
        <option value="2">2 ⭐</option>
        <option value="1">1 ⭐</option>
      </select>
    </div>
    <div class="form-row"><label>Текст ответа</label><textarea id="tpl-text" placeholder="Текст шаблона…"></textarea></div>
    <button class="btn-purple" onclick="addTemplate()">Добавить</button>
  </div>
</div>

<div id="toast-container"></div>

<script>
  const API = {
    reviews:       '/.netlify/functions/reviews',
    reply:         '/.netlify/functions/reply',
    generate:      '/.netlify/functions/generate',
    styles:        '/.netlify/functions/styles',
    questions:     '/.netlify/functions/questions',
    replyQuestion: '/.netlify/functions/reply-question',
    analyze:       '/.netlify/functions/analyze',
  }

  // ── State ──────────────────────────────────────────────────────────────────
  const rCards = new Map()  // review cards
  const qCards = new Map()  // question cards
  let styleExamples = []
  let starFilter = 0
  let currentTab = 'reviews'

  // ── Cache ──────────────────────────────────────────────────────────────────
  const CACHE_KEY = 'wb_reviews_cache'
  const CACHE_Q   = 'wb_questions_cache'
  const CACHE_TTL = 65_000

  function getCache(key) {
    try {
      const raw = sessionStorage.getItem(key)
      if (!raw) return null
      const { ts, data } = JSON.parse(raw)
      if (Date.now() - ts < CACHE_TTL) return data
    } catch {}
    return null
  }

  function setCache(key, data) {
    try { sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })) } catch {}
  }

  let refreshTimer = null
  function startCountdown(btn, label) {
    clearInterval(refreshTimer)
    let sec = Math.ceil(CACHE_TTL / 1000)
    btn.disabled = true
    refreshTimer = setInterval(() => {
      sec--
      if (sec <= 0) { clearInterval(refreshTimer); btn.disabled = false; btn.textContent = label }
      else btn.textContent = `${label} (${sec}с)`
    }, 1000)
  }

  // ── Templates ─────────────────────────────────────────────────────────────
  const DEFAULT_TEMPLATES = [
    { id: 't1', name: 'Спасибо за 5⭐', stars: 5, text: 'Благодарим Вас за отличный отзыв! Очень рады, что товар понравился. Ждём Вас снова!' },
    { id: 't2', name: 'Сожаление 1-2⭐', stars: 0, text: 'Приносим свои извинения за доставленные неудобства. Пожалуйста, напишите нам в чат поддержки — мы обязательно разберёмся и решим вопрос.' },
    { id: 't3', name: 'Учтём пожелания', stars: 3, text: 'Спасибо за обратную связь! Учтём Ваши пожелания при работе над товаром. Надеемся на повторную покупку!' },
  ]

  function getTemplates() {
    try {
      const raw = localStorage.getItem('wb_templates')
      return raw ? JSON.parse(raw) : [...DEFAULT_TEMPLATES]
    } catch { return [...DEFAULT_TEMPLATES] }
  }

  function saveTemplates(arr) {
    localStorage.setItem('wb_templates', JSON.stringify(arr))
  }

  function addTemplate() {
    const name  = document.getElementById('tpl-name').value.trim()
    const stars = parseInt(document.getElementById('tpl-stars').value)
    const text  = document.getElementById('tpl-text').value.trim()
    if (!name || !text) return toast('Заполни название и текст', 'error')
    const arr = getTemplates()
    arr.push({ id: 't' + Date.now(), name, stars, text })
    saveTemplates(arr)
    document.getElementById('tpl-name').value = ''
    document.getElementById('tpl-text').value = ''
    renderTemplatesList()
    toast('Шаблон добавлен')
  }

  function deleteTemplate(id) {
    saveTemplates(getTemplates().filter(t => t.id !== id))
    renderTemplatesList()
  }

  function renderTemplatesList() {
    const arr  = getTemplates()
    const list = document.getElementById('tpl-list')
    if (arr.length === 0) { list.innerHTML = '<p style="color:var(--muted);margin-bottom:12px">Нет шаблонов</p>'; return }
    list.innerHTML = arr.map(t => `
      <div class="tpl-item">
        <div class="tpl-item-header">
          <span class="tpl-name">${escHtml(t.name)}</span>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="tpl-stars-badge">${t.stars ? t.stars + ' ⭐' : 'Все'}</span>
            <button class="btn-muted" style="padding:3px 8px;font-size:12px" onclick="deleteTemplate('${t.id}')">✕</button>
          </div>
        </div>
        <div class="tpl-text">${escHtml(t.text)}</div>
      </div>
    `).join('')
  }

  function openTemplates()  { document.getElementById('modal-overlay').classList.add('open'); document.getElementById('modal-templates').classList.add('open'); renderTemplatesList() }
  function closeTemplates() { document.getElementById('modal-overlay').classList.remove('open'); document.getElementById('modal-templates').classList.remove('open') }

  // ── Utilities ─────────────────────────────────────────────────────────────
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)) }

  function escHtml(s = '') {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  function starsHtml(n) {
    return Array.from({ length: 5 }, (_, i) =>
      `<span class="${i < n ? 'star-filled' : 'star-empty'}">★</span>`
    ).join('')
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' })
  }

  function toast(msg, type = 'success') {
    const el = document.createElement('div')
    el.className = `toast ${type}`
    el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg
    document.getElementById('toast-container').appendChild(el)
    setTimeout(() => el.remove(), 3500)
  }

  // ── Tab switching ──────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'))
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'))
    document.getElementById(`tab-${tab}`).classList.add('active')
    document.querySelectorAll('.tab-btn')[['reviews','questions','analysis'].indexOf(tab)].classList.add('active')
  }

  // ── Star filter ────────────────────────────────────────────────────────────
  function setFilter(n) {
    starFilter = n
    document.querySelectorAll('.star-filter').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.f) === n)
    })
    for (const [id, c] of rCards) {
      const el = document.getElementById(`card-${id}`)
      if (!el) continue
      const s = c.review.productValuation || 0
      el.style.display = (n === 0 || s === n) ? '' : 'none'
    }
  }

  function updateFilterCounts() {
    const counts = {}
    for (const [, c] of rCards) {
      const s = c.review.productValuation || 0
      counts[s] = (counts[s] || 0) + 1
    }
    const total = rCards.size
    document.querySelector('[data-f="0"]').textContent = `Все (${total})`
    for (let i = 1; i <= 5; i++) {
      const btn = document.querySelector(`[data-f="${i}"]`)
      const cnt = counts[i] || 0
      btn.textContent = '★'.repeat(i) + (cnt ? ` (${cnt})` : '')
      btn.style.display = cnt ? '' : 'none'
    }
  }

  function updateApproveAllBtn() {
    const ready = [...rCards.values()].filter(c => c.state === 'ready').length
    const btn = document.getElementById('btn-approve-all')
    btn.style.display = ready > 0 ? '' : 'none'
    btn.textContent = `✓ Отправить все одобренные (${ready})`
  }

  // ── Render review card ─────────────────────────────────────────────────────
  function renderReviewCard(id) {
    const c   = rCards.get(id)
    const el  = document.getElementById(`card-${id}`)
    if (!el) return

    const product = c.review.productDetails?.productName || 'Неизвестный товар'
    const text    = c.review.text || '(без текста)'
    const n       = c.review.productValuation || 0

    let replyHtml = ''
    if (c.state === 'generating') {
      replyHtml = `<div class="reply-text generating">Генерирую ответ…</div>`
    } else if (c.state === 'editing') {
      const templates = getTemplates().filter(t => t.stars === 0 || t.stars === n)
      const tplOptions = templates.length
        ? `<div class="tpl-picker"><select onchange="applyTpl(this,'${id}')"><option value="">— выбрать шаблон —</option>${templates.map(t => `<option value="${escHtml(t.text)}">${escHtml(t.name)}</option>`).join('')}</select></div>`
        : ''
      replyHtml = tplOptions + `<textarea class="reply-textarea" id="ta-${id}">${escHtml(c.replyText)}</textarea>`
    } else {
      replyHtml = `<div class="reply-text">${escHtml(c.replyText)}</div>`
    }

    let actionsHtml = ''
    if (c.state === 'done') {
      actionsHtml = `<span class="done-label">✓ Ответ отправлен</span>`
    } else if (c.state === 'generating') {
      actionsHtml = `<button class="btn-green" disabled>✓ Отправить</button><button class="btn-blue" disabled>✏ Редактировать</button><button class="btn-muted" disabled>✕ Пропустить</button>`
    } else if (c.state === 'editing') {
      actionsHtml = `<button class="btn-green" onclick="saveEdit('${id}','review')">✓ Отправить</button><button class="btn-ghost" onclick="cancelEdit('${id}','review')">Отмена</button><button class="btn-muted" onclick="skip('${id}','review')">✕ Пропустить</button>`
    } else {
      actionsHtml = `<button class="btn-green" onclick="approve('${id}','review')">✓ Отправить</button><button class="btn-blue" onclick="startEdit('${id}','review')">✏ Редактировать</button><button class="btn-muted" onclick="skip('${id}','review')">✕ Пропустить</button>`
    }

    el.className = `card${c.state === 'done' ? ' done' : ''}`
    el.style.display = (starFilter === 0 || n === starFilter) ? '' : 'none'
    el.innerHTML = `
      <div class="card-header">
        <div class="card-meta"><div class="product-name">${escHtml(product)}</div><div class="card-date">${fmtDate(c.review.createdDate)}</div></div>
        <div class="stars">${starsHtml(n)}</div>
      </div>
      <div class="section-label">Отзыв</div>
      <div class="review-text">${escHtml(text)}</div>
      <div class="reply-block"><div class="section-label">Предложенный ответ</div>${replyHtml}</div>
      <div class="card-actions">${actionsHtml}</div>
    `
    updateApproveAllBtn()
  }

  // ── Render question card ───────────────────────────────────────────────────
  function renderQuestionCard(id) {
    const c  = qCards.get(id)
    const el = document.getElementById(`qcard-${id}`)
    if (!el) return

    const product = c.q.productDetails?.productName || 'Неизвестный товар'
    const text    = c.q.text || '(без текста)'

    let replyHtml = ''
    if (c.state === 'generating') {
      replyHtml = `<div class="reply-text generating">Генерирую ответ…</div>`
    } else if (c.state === 'editing') {
      replyHtml = `<textarea class="reply-textarea" id="qta-${id}">${escHtml(c.replyText)}</textarea>`
    } else {
      replyHtml = `<div class="reply-text">${escHtml(c.replyText)}</div>`
    }

    let actionsHtml = ''
    if (c.state === 'done') {
      actionsHtml = `<span class="done-label">✓ Ответ отправлен</span>`
    } else if (c.state === 'generating') {
      actionsHtml = `<button class="btn-green" disabled>✓ Отправить</button><button class="btn-blue" disabled>✏ Редактировать</button><button class="btn-muted" disabled>✕ Пропустить</button>`
    } else if (c.state === 'editing') {
      actionsHtml = `<button class="btn-green" onclick="saveEdit('${id}','question')">✓ Отправить</button><button class="btn-ghost" onclick="cancelEdit('${id}','question')">Отмена</button><button class="btn-muted" onclick="skip('${id}','question')">✕ Пропустить</button>`
    } else {
      actionsHtml = `<button class="btn-green" onclick="approve('${id}','question')">✓ Отправить</button><button class="btn-blue" onclick="startEdit('${id}','question')">✏ Редактировать</button><button class="btn-muted" onclick="skip('${id}','question')">✕ Пропустить</button>`
    }

    el.className = `card${c.state === 'done' ? ' done' : ''}`
    el.innerHTML = `
      <div class="card-header">
        <div class="card-meta"><div class="product-name">${escHtml(product)}</div><div class="card-date">${fmtDate(c.q.createdDate)}</div></div>
        <span style="font-size:18px">❓</span>
      </div>
      <div class="section-label">Вопрос</div>
      <div class="review-text">${escHtml(text)}</div>
      <div class="reply-block"><div class="section-label">Предложенный ответ</div>${replyHtml}</div>
      <div class="card-actions">${actionsHtml}</div>
    `
  }

  // ── Template apply ─────────────────────────────────────────────────────────
  function applyTpl(sel, reviewId) {
    if (!sel.value) return
    const ta = document.getElementById(`ta-${reviewId}`)
    if (ta) ta.value = sel.value
    sel.value = ''
  }

  // ── Actions ────────────────────────────────────────────────────────────────
  async function approve(id, type) {
    const isReview = type === 'review'
    const c = isReview ? rCards.get(id) : qCards.get(id)

    const res = await fetch(isReview ? API.reply : API.replyQuestion, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, text: c.replyText })
    })

    if (res.ok) {
      c.state = 'done'
      isReview ? renderReviewCard(id) : renderQuestionCard(id)
      toast('Ответ отправлен на Wildberries')
    } else {
      const err = await res.json().catch(() => ({}))
      toast(err.error || 'Ошибка отправки', 'error')
    }
  }

  function startEdit(id, type) {
    const c = type === 'review' ? rCards.get(id) : qCards.get(id)
    c.state = 'editing'
    type === 'review' ? renderReviewCard(id) : renderQuestionCard(id)
    setTimeout(() => {
      const ta = document.getElementById(type === 'review' ? `ta-${id}` : `qta-${id}`)
      if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length) }
    }, 50)
  }

  function cancelEdit(id, type) {
    const c = type === 'review' ? rCards.get(id) : qCards.get(id)
    c.state = 'ready'
    type === 'review' ? renderReviewCard(id) : renderQuestionCard(id)
  }

  async function saveEdit(id, type) {
    const taId = type === 'review' ? `ta-${id}` : `qta-${id}`
    const ta = document.getElementById(taId)
    if (!ta) return
    const text = ta.value.trim()
    if (!text) return toast('Ответ не может быть пустым', 'error')
    const c = type === 'review' ? rCards.get(id) : qCards.get(id)
    c.replyText = text
    await approve(id, type)
  }

  function skip(id, type) {
    const c = type === 'review' ? rCards.get(id) : qCards.get(id)
    c.state = 'done'
    type === 'review' ? renderReviewCard(id) : renderQuestionCard(id)
  }

  async function approveAll() {
    const ready = [...rCards.entries()].filter(([, c]) => c.state === 'ready')
    if (!ready.length) return
    const btn = document.getElementById('btn-approve-all')
    btn.disabled = true
    for (const [id] of ready) {
      await approve(id, 'review')
      await sleep(400)
    }
    btn.disabled = false
    updateApproveAllBtn()
  }

  // ── Generate ───────────────────────────────────────────────────────────────
  async function generateReview(id) {
    const c = rCards.get(id)
    try {
      const res = await fetch(API.generate, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'review', review: c.review, examples: styleExamples })
      })
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Ошибка')
      const data = await res.json()
      c.replyText = data.reply
      c.state = 'ready'
    } catch (e) {
      c.replyText = '— не удалось сгенерировать ответ'
      c.state = 'ready'
    }
    renderReviewCard(id)
  }

  async function generateQuestion(id) {
    const c = qCards.get(id)
    try {
      const res = await fetch(API.generate, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'question', question: c.q })
      })
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Ошибка')
      const data = await res.json()
      c.replyText = data.reply
      c.state = 'ready'
    } catch (e) {
      c.replyText = '— не удалось сгенерировать ответ'
      c.state = 'ready'
    }
    renderQuestionCard(id)
  }

  // ── Load reviews ───────────────────────────────────────────────────────────
  async function loadReviews() {
    const list = document.getElementById('reviews-list')
    rCards.clear()
    list.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Загрузка отзывов…</p></div>`

    try {
      let reviews = getCache(CACHE_KEY)
      if (!reviews) {
        const res = await fetch(API.reviews)
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`)
        reviews = await res.json()
        setCache(CACHE_KEY, reviews)
      }

      document.getElementById('cnt-reviews').textContent = reviews.length

      if (reviews.length === 0) {
        list.innerHTML = `<div class="state-box"><div class="icon">🎉</div><p>Неотвеченных отзывов нет</p></div>`
        return
      }

      list.innerHTML = reviews.map(r => `<div class="card" id="card-${r.id}"></div>`).join('')
      for (const r of reviews) {
        rCards.set(r.id, { review: r, replyText: '', state: 'generating' })
        renderReviewCard(r.id)
      }
      updateFilterCounts()

      for (const r of reviews) {
        await generateReview(r.id)
        await sleep(400)
      }

    } catch (e) {
      list.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>${escHtml(e.message)}</p></div>`
    }
  }

  // ── Load questions ─────────────────────────────────────────────────────────
  async function loadQuestions() {
    const list = document.getElementById('questions-list')
    qCards.clear()
    list.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Загрузка вопросов…</p></div>`

    try {
      let questions = getCache(CACHE_Q)
      if (!questions) {
        const res = await fetch(API.questions)
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`)
        questions = await res.json()
        setCache(CACHE_Q, questions)
      }

      document.getElementById('cnt-questions').textContent = questions.length

      if (questions.length === 0) {
        list.innerHTML = `<div class="state-box"><div class="icon">✅</div><p>Неотвеченных вопросов нет</p></div>`
        return
      }

      list.innerHTML = questions.map(q => `<div class="card" id="qcard-${q.id}"></div>`).join('')
      for (const q of questions) {
        qCards.set(q.id, { q, replyText: '', state: 'generating' })
        renderQuestionCard(q.id)
      }

      for (const q of questions) {
        await generateQuestion(q.id)
        await sleep(400)
      }

    } catch (e) {
      list.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>${escHtml(e.message)}</p></div>`
    }
  }

  // ── Load styles ────────────────────────────────────────────────────────────
  async function loadStyles() {
    const btn = document.getElementById('btn-style')
    btn.disabled = true
    btn.textContent = '⏳ Загружаю…'
    try {
      const res = await fetch(API.styles)
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`)
      const data = await res.json()
      styleExamples = data.examples || []
      btn.textContent = `✓ Стиль (${styleExamples.length})`
      toast(`Загружено ${styleExamples.length} примеров стиля`)
    } catch (e) {
      btn.disabled = false
      btn.textContent = '🎨 Стиль'
      toast(e.message, 'error')
    }
  }

  // ── Load all ───────────────────────────────────────────────────────────────
  async function loadAll() {
    const btn = document.getElementById('btn-refresh')
    sessionStorage.removeItem(CACHE_KEY)
    sessionStorage.removeItem(CACHE_Q)
    startCountdown(btn, '↻ Обновить')
    await Promise.all([loadReviews(), loadQuestions()])
  }

  // ── Analysis ───────────────────────────────────────────────────────────────
  async function runAnalysis() {
    const nmId = document.getElementById('analysis-nm').value.trim()
    const btn  = document.getElementById('btn-analyze')
    const result = document.getElementById('analysis-result')
    const meta   = document.getElementById('analysis-meta')
    const body   = document.getElementById('analysis-body')

    btn.disabled = true
    btn.textContent = '⏳ Анализирую…'
    result.classList.remove('show')

    try {
      const res = await fetch(API.analyze, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nmId: nmId || null })
      })
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`)
      const data = await res.json()

      meta.innerHTML = `<strong>${escHtml(data.product)}</strong> · ${data.count} отзывов · средняя оценка ${data.avgRating} ⭐`
      body.innerHTML = renderMarkdown(data.analysis)
      result.classList.add('show')

    } catch (e) {
      toast(e.message, 'error')
    } finally {
      btn.disabled = false
      btn.textContent = 'Анализировать'
    }
  }

  function renderMarkdown(text) {
    return text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/\n\n/g, '<br>')
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  Promise.all([loadReviews(), loadQuestions()])
</script>

</body>
</html>
